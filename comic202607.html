    <style>
        /* 延續與首頁、清單完全對齊的 980px 純淨燕麥色風格 */
        body {
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fffaf5; 
            color: #4a3b32;
            margin: 0;
            padding: 0;
        }
        .wrap {
            max-width: 980px;
            margin: 40px auto;
            padding: 20px;
        }
        
        /* 返回導覽 */
        .back-nav { 
            margin-bottom: 25px; 
            font-size: 15px;
        }
        .back-link { 
            text-decoration: none; 
            color: #b57c4c; 
            font-weight: 500; 
            transition: color 0.3s ease; 
        }
        .back-link:hover { 
            color: #d4a373; 
        }

        /* 標題大卡片 */
        .header-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            text-align: center;
        }
        .page-title { 
            color: #4a3b32; 
            font-size: 28px; 
            font-weight: 700; 
            margin: 0 0 8px 0; 
        }
        .page-subtitle {
            color: #bfaaa0;
            font-size: 15px;
            margin: 0;
        }
        
        /* 📚 精緻漫畫書棚區 */
        .shelf-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
        }
        
        /* 書格網路佈局 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }
        
        /* 單本漫畫書籍卡片樣式 */
        .book-item {
            background: #fffbf7;
            border: 1px solid #f0e2d5;
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 150px;
            transition: all 0.3s ease;
        }
        .book-item:hover {
            transform: translateY(-4px);
            border-color: #d4a373;
            box-shadow: 0 6px 18px rgba(181, 124, 76, 0.08);
        }
        
        .book-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .book-title {
            font-size: 17px;
            font-weight: 700;
            color: #4a3b32;
            margin: 0;
            line-height: 1.4;
        }
        .book-meta {
            font-size: 13.5px;
            color: #bfaaa0;
            font-weight: 400;
        }
        
        /* 翻頁閱讀按鈕 */
        .book-link-btn {
            display: inline-block;
            text-align: center;
            background: #d4a373; 
            color: #fff;
            text-decoration: none;
            padding: 11px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 3px 8px rgba(212, 163, 115, 0.15);
        }
        .book-link-btn:hover {
            background: #b57c4c;
            transform: translateY(-1px);
        }

        /* 手機板響應式優化 */
        @media (max-width: 600px) { 
            .header-card, .shelf-card { padding: 25px 20px; } 
            .page-title { font-size: 22px; } 
            .book-grid { grid-template-columns: 1fr; gap: 16px; }
            .book-item { height: 130px; padding: 20px; }
        }
    </style>
</head>
