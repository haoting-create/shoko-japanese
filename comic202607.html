<!doctype html>
<html lang='zh-Hant'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>2026年07月 ｜ 線上電子漫畫書架</title>
    <style>
        /* 延續與首頁、清單完全對齊的 980px 純淨燕麥色風格 */
        body {
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fffaf5; 
            color: #4a3b32;
            margin: 0;
            padding: 0;
        }
        .wrap {
            max-width: 980px;
            margin: 40px auto;
            padding: 20px;
        }
        
        /* 返回導覽 */
        .back-nav { 
            margin-bottom: 25px; 
            font-size: 15px;
        }
        .back-link { 
            text-decoration: none; 
            color: #b57c4c; 
            font-weight: 500; 
            transition: color 0.3s ease; 
        }
        .back-link:hover { 
            color: #d4a373; 
        }

        /* 標題大卡片 */
        .header-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            text-align: center;
        }
        .page-title { 
            color: #4a3b32; 
            font-size: 28px; 
            font-weight: 700; 
            margin: 0 0 8px 0; 
        }
        .page-subtitle {
            color: #bfaaa0;
            font-size: 15px;
            margin: 0;
        }
        
        /* 📚 精緻漫畫書棚區 */
        .shelf-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            margin-bottom: 25px;
        }
        
        /* 書格網路佈局 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }
        
        /* 單本漫畫書籍卡片樣式 */
        .book-item {
            background: #fffbf7;
            border: 1px solid #f0e2d5;
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 150px;
            transition: all 0.3s ease;
        }
        .book-item:hover {
            transform: translateY(-4px);
            border-color: #d4a373;
            box-shadow: 0 6px 18px rgba(181, 124, 76, 0.08);
        }
        
        .book-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .book-title {
            font-size: 17px;
            font-weight: 700;
            color: #4a3b32;
            margin: 0;
            line-height: 1.4;
        }
        .book-meta {
            font-size: 13.5px;
            color: #bfaaa0;
            font-weight: 400;
        }
        
        /* 翻頁閱讀按鈕 */
        .book-link-btn {
            display: inline-block;
            text-align: center;
            background: #d4a373; 
            color: #fff;
            text-decoration: none;
            padding: 11px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 3px 8px rgba(212, 163, 115, 0.15);
        }
        .book-link-btn:hover {
            background: #b57c4c;
            transform: translateY(-1px);
        }

        /* 📺 漫畫專屬巨幕展演卡片 */
        .reader-card {
            display: none; 
            background: #fff;
            border: 2px solid #d4a373;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(181, 124, 76, 0.06);
            margin-top: 25px;
        }
        .reader-title {
            font-size: 18px;
            font-weight: 700;
            color: #b57c4c;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        .iframe-container {
            position: relative;
            padding-bottom: 65%; 
            height: 0;
            overflow: hidden;
            border-radius: 14px;
            border: 1px solid #ead8c8;
            background: #fafafa;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 手機板響應式優化 */
        @media (max-width: 600px) { 
            .header-card, .shelf-card, .reader-card { padding: 25px 20px; } 
            .page-title { font-size: 22px; } 
            .book-grid { grid-template-columns: 1fr; gap: 16px; }
            .book-item { height: 130px; padding: 20px; }
            .iframe-container { padding-bottom: 120%; } 
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- 頂部導覽 -->
    <div class="back-nav">
        <a href='comic.html' class="back-link">← 返回電子漫畫月份目錄</a>
    </div>
    
    <!-- 標題卡片 -->
    <div class="header-card">
        <h1 class="page-title">🎨 2026 年 07 月 ｜ 電子漫畫書架</h1>
        <p class="page-subtitle">點選下方書籍，即可在網頁內直接開啟精美翻頁閱讀，不再受外部跳轉干擾</p>
    </div>

    <!-- 🎪 7月份專屬線上書櫥 -->
    <div class="shelf-card">
        <div class="book-grid">
            
            <!-- 👑 7/10 漫畫書 -->
            <div class="book-item">
                <div class="book-info">
                    <h3 class="book-title">📖 7/10日 生活學習日記</h3>
                    <span class="book-meta">主題：身心靈的微小累積</span>
                </div>
                <button onclick="openBook('7/10日 生活學習日記', 'gzri')" class="book-link-btn">在線直接翻閱 ➔</button>
            </div>

            <!-- 👑 7/09 漫畫書 -->
            <div class="book-item">
                <div class="book-info">

                </div>
                <button onclick="openBook('7/09日 生活學習日記', 'vwxm')" class="book-link-btn">在線直接翻閱 ➔</button>
            </div>

            <!-- 👑 7/08 漫畫書 -->
            <div class="book-item">
                <div class="book-info">
                    <h3 class="book-title">📖 7/08日 生活學習日記</h3>
                    <span class="book-meta">主題：熱情互相感染、善意流動</span>
                </div>
                <button onclick="openBook('7/08日 生活學習日記', 'qpcf')" class="book-link-btn">在線直接翻閱 ➔</button>
            </div>

            <!-- 👑 7/07 漫畫書 -->
            <div class="book-item">
                <div class="book-info">
                    <h3 class="book-title">📖 7/07日 生活學習日記</h3>
                    <span class="book-meta">主題：心中自然有所拿捏</span>
                </div>
                <button onclick="openBook('7/07日 生活學習日記', 'llwx')" class="book-link-btn">在線直接翻閱 ➔</button>
            </div>

            <!-- 👑 7/06 漫畫書 -->
            <div class="book-item">
                <div class="book-info">
                    <h3 class="book-title">📖 7/06日 生活學習日記</h3>
                    <span class="book-meta">主題：累積信任，誠信至上</span>
                </div>
                <button onclick="openBook('7/06日 生活學習日記', 'lrhx')" class="book-link-btn">在線直接翻閱 ➔</button>
            </div>

        </div>
    </div>

    <!-- 📺 漫畫原地展演大巨幕 (預設隱藏) -->
    <div id="comic-reader" class="reader-card">
        <h2 id="reader-book-title" class="reader-title">正在閱讀書籍</h2>
        <div class="iframe-container">
            <iframe id="book-frame" src="" seamless="seamless" scrolling="no" frameborder="0" allowtransparency="true" allowfullscreen="true"></iframe>
        </div>
    </div>

</div>

<!-- 💡 最終整合安全直讀核心控制代碼 -->
<script>
function openBook(title, bookCode) {
    var readerBox = document.getElementById('comic-reader');
    var bookFrame = document.getElementById('book-frame');
    var titleDisplay = document.getElementById('reader-book-title');
    
    // 💡 終極安全機制：全部指向官方 html5 無干擾直讀伺服器網址
    var secureEmbedUrl = "https://html5.fliphtml5.com/HaoTing1981/" + bookCode + "/";
    
    titleDisplay.innerHTML = "📖 現正線上翻閱：《" + title + "》";
    bookFrame.src = secureEmbedUrl;
    readerBox.style.display = "block";
    
    // 絲滑對齊巨幕
    readerBox.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
