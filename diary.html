<!doctype html>
<html lang='zh-Hant'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>浩婷每日心得 ｜ 月份總目錄</title>
    <link rel='stylesheet' href='style.css'>
    <style>
        /* 全域視覺優化 */
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 24px;
            line-height: 1.6;
            background: #fffaf5; /* 暖心燕麥色底 */
            color: #4a3b32;
        }
        
        /* 頂部導覽 */
        .back-nav {
            margin-bottom: 30px;
        }
        .back-link {
            text-decoration: none;
            color: #b57c4c;
            font-weight: 500;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: #d4a373;
            transform: translateX(-4px);
        }

        /* 標題區塊設計 */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }
        .page-title {
            color: #4a3b32;
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: 1px;
        }
        .page-subtitle {
            color: #8c7b70;
            font-size: 16px;
            margin: 0 auto;
            max-width: 500px;
        }
        .header-line {
            width: 60px;
            height: 3px;
            background: #d4a373;
            margin: 25px auto 0;
            border-radius: 2px;
        }

        /* 年度分組區塊 */
        .year-section {
            margin-bottom: 40px;
        }
        .year-label {
            font-size: 18px;
            color: #8c7b70;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-left: 5px;
        }
        .year-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ead8c8;
        }

        /* 網格佈局 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        /* 全新重做卡片樣式 */
        .month-card {
            background: #ffffff;
            border: 1px solid #ead8c8;
            border-radius: 20px;
            padding: 28px 24px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(74, 59, 50, 0.03);
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        /* 卡片滑鼠懸停華麗特效 */
        .month-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(181, 124, 76, 0.12);
            border-color: #d4a373;
        }
        
        /* 卡片頂部裝飾條 */
        .month-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #ead8c8;
            transition: background 0.3s ease;
        }
        .month-card:hover::before {
            background: #d4a373; /* 懸停時裝飾條變色 */
        }

        /* 卡片內文 */
        .month-title {
            color: #4a3b32;
            font-size: 20px;
            margin: 0 0 14px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .meta-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .month-desc {
            color: #7a6b60;
            font-size: 14.5px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .date-range {
            color: #bfaaa0;
            font-size: 12.5px;
            margin: 0;
        }

        /* 手機板響應式優化 */
        @media (max-width: 600px) {
            body { margin: 30px auto; padding: 0 16px; }
            .page-title { font-size: 26px; }
            .card-grid { grid-template-columns: 1fr; gap: 16px; }
            .month-card { padding: 22px 20px; }
        }
    </style>
</head>
<body>

    <!-- 頂部導覽 -->
    <div class="back-nav">
        <a href='index.html' class="back-link">← 返回首頁</a>
    </div>
    
    <!-- 網頁大標題區塊 -->
    <header class="page-header">
        <h1 class="page-title">浩婷每日心得 ‧ 月份總目錄</h1>
        <p class="page-subtitle">記錄紅塵實修與轉念的點滴心路歷程，讓心時時保持清靜。</p>
        <div class="header-line"></div>
    </header>

    <!-- 2026 年度區塊 -->
    <div class="year-section">
        <div class="year-label">✨ 2026 年</div>
        
        <div class="card-grid">

            <!-- 6月份卡片 -->
            <a href="list202606.html" class="month-card">
                <p class="month-title">📅 06 月份</p>
                <div class="meta-info">
                    <p class="month-desc">✍️ 共 9 篇實修心得</p>
                    <p class="date-range">期間：06/21 - 06/30</p>
                </div>
            </a>

            <!-- 7月份卡片 -->
            <a href="list202607.html" class="month-card">
                <p class="month-title">📅 07 月份</p>
                <div class="meta-info">
                    <p class="month-desc">✍️ 共 1 篇實修心得</p>
                    <p class="date-range">期間：07/01 - 連載中</p>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
