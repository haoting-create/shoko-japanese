<!doctype html>
<html lang='zh-Hant'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>浩婷每日心得 ｜ 月份總目錄</title>
    <style>
        /* 延續與內頁、清單完全對齊的 980px 純淨燕麥色風格 */
        body {
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fffaf5; 
            color: #4a3b32;
            margin: 0;
            padding: 0;
        }
        .wrap {
            max-width: 980px;
            margin: 40px auto;
            padding: 20px;
        }
        
        /* 頂部導覽 */
        .back-nav {
            margin-bottom: 25px;
            font-size: 15px;
        }
        .back-link {
            text-decoration: none;
            color: #b57c4c;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #d4a373;
        }

        /* 標題大卡片 */
        .header-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            margin-bottom: 22px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            text-align: center;
        }
        .page-title {
            color: #4a3b32;
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: 1px;
        }
        .page-subtitle {
            color: #8c7b70;
            font-size: 16px;
            margin: 0;
        }

        /* 年度分組標籤 */
        .year-label {
            font-size: 18px;
            color: #8c7b70;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 30px 0 20px 5px;
        }
        .year-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ead8c8;
        }

        /* 7個月份卡片網格佈局 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }

        /* 卡片基礎樣式 */
        .month-card {
            background: #ffffff;
            border: 1px solid #ead8c8;
            border-radius: 20px;
            padding: 24px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 110px; /* 固定高度讓網格更整齊 */
        }
        
        /* 已啟用月份卡片的懸停特效 */
        .month-card.active:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(181, 124, 76, 0.1);
            border-color: #d4a373;
        }

        /* 卡片內文字 */
        .month-title {
            color: #4a3b32;
            font-size: 19px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }
        .month-desc {
            color: #7a6b60;
            font-size: 14px;
            margin: 0;
        }
        .date-range {
            color: #bfaaa0;
            font-size: 12px;
            margin-top: 2px;
        }

        /* 未來月份的精緻虛線預留樣式 */
        .month-card.future {
            border-style: dashed;
            background: #fafafa;
            opacity: 0.55;
            cursor: default;
        }
        .month-card.future .month-title {
            color: #8c7b70;
        }
        .month-card.future .month-desc {
            color: #bfaaa0;
            font-style: italic;
        }

        /* 手機板調整 */
        @media (max-width: 600px) {
            .header-card { padding: 25px 20px; }
            .page-title { font-size: 24px; }
            .card-grid { grid-template-columns: 1fr; gap: 16px; }
            .month-card { height: auto; }
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- 頂部導覽 -->
    <div class="back-nav">
        <a href='index.html' class="back-link">← 返回首頁</a>
    </div>
    
    <!-- 大標題大卡片 -->
    <header class="header-card">
        <h1 class="page-title">浩婷每日心得 ‧ 月份總目錄</h1>
        <p class="page-subtitle">記錄紅塵實修與轉念的點滴心路歷程，讓心時時保持清靜。</p>
    </header>

    <!-- 2026 年度區塊 -->
    <div class="year-section">
        <div class="year-label">✨ 2026 年</div>
        
        <div class="card-grid">

            <!-- 6月份卡片：點擊跳轉到 6月專屬清單網頁 -->
            <a href="list202606.html" class="month-card active">
                <div class="month-title">📅 06 月份</div>
                <div>
                    <p class="month-desc">✍️ 共 10 篇實修心得</p>
                    <p class="date-range">06/21 - 06/30</p>
                </div>
            </a>

            <!-- 7月份卡片：點擊跳轉到 7月專屬清單網頁 -->
            <a href="list202607.html" class="month-card active">
                <div class="month-title">📅 07 月份</div>
                <div>
                    <p class="month-desc">✍️ 共 1 篇實修心得</p>
                    <p class="date-range">07/01 - 連載中</p>
                </div>
            </a>

            <!-- 8月份卡片（預留） -->
            <div class="month-card future">
                <div class="month-title">📅 08 月份</div>
                <p class="month-desc">☀️ 盛夏光芒 ‧ 敬請期待</p>
            </div>

            <!-- 9月份卡片（預留） -->
            <div class="month-card future">
                <div class="month-title">📅 09 月份</div>
                <p class="month-desc">🌾 初秋實修 ‧ 敬請期待</p>
            </div>

            <!-- 10月份卡片（預留） -->
            <div class="month-card future">
                <div class="month-title">📅 10 月份</div>
                <p class="month-desc">🍁 豐盛資糧 ‧ 敬請期待</p>
            </div>

            <!-- 11月份卡片（預留） -->
            <div class="month-card future">
                <div class="month-title">📅 11 月份</div>
                <p class="month-desc">🍂 秋末轉念 ‧ 敬請期待</p>
            </div>

            <!-- 12月份卡片（預留） -->
            <div class="month-card future">
                <div class="month-title">📅 12 月份</div>
                <p class="month-desc">❄️ 歲末感恩 ‧ 敬請期待</p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
