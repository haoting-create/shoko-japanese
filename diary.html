<!doctype html>
<html lang='zh-Hant'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>浩婷每日中文心得目錄</title>
<style>
/* 溫馨日系底色 */
body {
    font-family: "Noto Sans TC", sans-serif;
    background: #fffaf5;
    margin: 0;
    padding: 0;
    color: #4a4a4a;
}
.wrap {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}
/* 超可愛回首頁按鈕 */
.back-btn {
    display: inline-block;
    text-decoration: none;
    color: #ff8da1;
    font-weight: bold;
    background: #ffffff;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #ffe4e1;
    box-shadow: 0 2px 8px rgba(255,182,193,0.1);
    transition: all 0.3s;
}
.back-btn:hover {
    background: #fff0f2;
    transform: translateX(-3px);
}
/* 主標題設計：加上可愛櫻花裝飾 */
h1 {
    color: #d16276;
    font-size: 2.2em;
    text-align: center;
    margin: 30px 0;
    position: relative;
}
h1::before, h1::after {
    content: "🌸";
    margin: 0 10px;
    font-size: 0.8em;
}
/* 卡片列表容器 */
.card-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 30px;
}
/* 活潑的拍立得卡片樣式 */
.diary-card {
    display: block;
    text-decoration: none;
    background: #ffffff;
    border: 2px solid #ead8c8;
    border-radius: 20px;
    padding: 22px 28px;
    box-shadow: 0 6px 12px rgba(234, 216, 200, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
/* 滑鼠移過去的浮起放大特效 */
.diary-card:hover {
    transform: translateY(-5px);
    border-color: #ffb6c1;
    box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
}
/* 第一篇（最新一章）加上特別標籤飾條 */
.diary-card.latest::after {
    content: "NEW ✨";
    position: absolute;
    top: 12px;
    right: 20px;
    background: #ff8da1;
    color: white;
    font-size: 0.8em;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 12px;
}
/* 卡片內日期樣式 */
.card-date {
    font-size: 0.9em;
    color: #b09987;
    margin: 0 0 8px 0;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 5px;
}
/* 卡片內標題樣式 */
.card-title {
    font-size: 1.25em;
    color: #4a4a4a;
    margin: 0;
    font-weight: bold;
    line-height: 1.4;
    transition: color 0.3s;
}
.diary-card:hover .card-title {
    color: #d16276; /* 滑鼠移上去文字變粉色 */
}
</style>
</head>
<body>

<div class='wrap'>
    <p><a href='index.html' class="back-btn">🌟 回首頁入口</a></p>
    
    <h1>浩婷每日中文心得</h1>
    
    <div class="card-list">
        
        <!-- 【卡片 2】：最新一篇文章 -->
        <a href='diary002.html' class='diary-card latest'>
            <p class='card-date'>📅 2026/06/22</p>
            <p class='card-title'>📝 檢查自己心中的那把尺到底準不準</p>
        </a>
        
        <!-- 【卡片 1】：第一篇文章 -->
        <a href='diary001.html' class='diary-card'>
            <p class='card-date'>📅 2026/06/21</p>
            <p class='card-title'>📝 我的新發現！AI 營養師到我家報到啦！</p>
        </a>
        
    </div>
</div>

</body>
</html>
