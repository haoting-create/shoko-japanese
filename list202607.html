<!doctype html>
<html lang='zh-Hant'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>2026年07月 ｜ 實修心得清單</title>
    <style>
        /* 延續與內頁完全對齊的 980px 純淨燕麥色風格 */
        body {
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fffaf5; 
            color: #4a3b32;
            margin: 0;
            padding: 0;
        }
        .wrap {
            max-width: 980px;
            margin: 40px auto;
            padding: 20px;
        }
        
        /* 返回導覽 */
        .back-nav { 
            margin-bottom: 25px; 
            font-size: 15px;
        }
        .back-link { 
            text-decoration: none; 
            color: #b57c4c; 
            font-weight: 500; 
            transition: color 0.3s ease; 
        }
        .back-link:hover { 
            color: #d4a373; 
        }

        /* 標題卡片 */
        .header-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 22px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
            text-align: center;
        }
        .page-title { 
            color: #4a3b32; 
            font-size: 28px; 
            font-weight: 700; 
            margin: 0; 
        }
        
        /* 心得列表條目大卡片 */
        .list-card {
            background: #fff;
            border: 1px solid #ead8c8;
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.02);
        }

        .diary-list { 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }
        
        /* 列表單一條目樣式 */
        .diary-item { 
            background: #ffffff; 
            border: 1px solid #ead8c8; 
            border-radius: 16px; 
            padding: 18px 24px; 
            text-decoration: none; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: all 0.3s ease; 
        }
        .diary-item:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 15px rgba(181, 124, 76, 0.08); 
            border-color: #d4a373; 
        }
        .diary-title { 
            font-size: 17.5px; 
            font-weight: 700; 
            color: #4a3b32; 
            margin: 0; 
        }
        .diary-date { 
            font-size: 14px; 
            color: #bfaaa0; 
            font-weight: 500; 
            flex-shrink: 0; 
            margin-left: 15px; 
        }

        /* 手機板響應式優化 */
        @media (max-width: 600px) { 
            .header-card, .list-card { padding: 25px 20px; } 
            .page-title { font-size: 22px; } 
            .diary-item { flex-direction: column; align-items: flex-start; gap: 8px; } 
            .diary-date { margin-left: 0; } 
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- 頂部導覽 -->
    <div class="back-nav">
        <a href='diary.html' class="back-link">← 返回月份總目錄</a>
    </div>
    
    <!-- 標題卡片 -->
    <div class="header-card">
        <h1 class="page-title">📅 2026 年 07 月心得清單</h1>
    </div>

    <!-- 列表大卡片 -->
    <div class="list-card">
        <div class="diary-list">
            <!-- 第 11 篇：7/01 菁英會心得 -->
            <a href="diary011.html" class="diary-item">
                <p class="diary-title">讓心清靜，調動靈魂深處的潛能與智慧</p>
                <span class="diary-date">2026/07/01</span>
            </a>
        </div>
    </div>

</div>

</body>
</html>
